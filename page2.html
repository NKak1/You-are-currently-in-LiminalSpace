    <h1>Level 1 : The Habitable Zone [生存可能領域]</h1>

    <p>
      壁と床がコンクリートで出来た駐車場のような空間。<br>
      どこからか霧が低く立ち込め、床に水溜りを形成している。<br>
      構造は多様で広大。物資が入った箱がランダムに生成される。
      </p>
      <p>
      照明が不安定で、時には消えることもある。<br>
      霧や水は純粋であり、緊急時は水溜りで水分補給が可能。
      </p>
      <p>
      光が消えた際、影のような生物に襲われることがある。<br>
      常に光源を携帯しておくべきだろう。<br>
      貴方の大切なものを失いたくなければ常に身につけておくことをお勧めする。
      </p>
      <p>
      理解度:90%<br>
      危険度:1/5 
      </p>
    </p>
