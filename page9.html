    <h1>Level 8 : The Cave System [洞窟網]</h1>

    <p>
      石灰石で満たされた洞窟のような空間。<br>
      おそらく無限に広がる双曲空間である。<br>
      視界が悪く、敵対生物も多いため極めて危険。
      </p>
      <p>
      酸を飛ばす体長約2cmの蜘蛛のようなものが無数存在する。<br>
      一回の遭遇あたり数百体の個体の対処を強いられるだろう。
      </p>
      <p>
      この空間には地底湖や液体酸素が湧き出す泉などが存在するが、<br>
      空間の危険性故、詳細は不明である。<br>
      「出口」や地下道を見つけ脱出することをお勧めする。
      </p>
      <p>
      理解度:10%<br>
      危険度:5/5 
      </p>
    </p>
